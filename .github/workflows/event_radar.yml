name: Event radar

on:
  schedule:
    - cron: "30 12 * * 1-5"  # UTC 12:30, Taiwan 20:30, Monday-Friday
  workflow_dispatch:
    inputs:
      send_email:
        description: "Send event and trend alert emails"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      max_events:
        description: "Maximum RSS events to scan"
        required: true
        default: "30"

permissions:
  contents: write

concurrency:
  group: event-radar
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write config/.env from secrets
        run: |
          mkdir -p config
          cat > config/.env << EOF
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          GMAIL_SENDER=${{ secrets.GMAIL_SENDER }}
          GMAIL_RECEIVER=${{ secrets.GMAIL_RECEIVER }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          LLM_MODEL=openrouter/deepseek/deepseek-chat-v3-0324
          EOF

      - name: Run tests
        run: |
          python -m unittest tests.test_event_radar

      - name: Run event radar
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          MAX_EVENTS="${{ github.event.inputs.max_events || '30' }}"
          SEND_EMAIL="${{ github.event.inputs.send_email || 'true' }}"

          if [ "$SEND_EMAIL" = "true" ]; then
            python -m event_radar.cli --run-daily --max-events "$MAX_EVENTS" --send-email-alerts
            python -m event_radar.cli --update-trends --send-trend-alerts
          else
            python -m event_radar.cli --run-daily --max-events "$MAX_EVENTS"
            python -m event_radar.cli --update-trends
          fi

          python -m event_radar.cli --update-performance
          python -m event_radar.cli --performance-summary --summary-horizon 5 --summary-group-by theme

      - name: Commit radar state back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/db/market.db data/signal_log.csv report/ || true
          git diff --cached --quiet && echo "No radar state changes to commit" || \
            git commit -m "data: event radar state $(date +%Y-%m-%d)" && \
            git push
