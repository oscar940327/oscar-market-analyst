name: Daily report

on:
  workflow_dispatch:
    inputs:
      run_legacy_daily_report:
        description: "Run the legacy daily report workflow from main"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  run:
    if: ${{ github.event.inputs.run_legacy_daily_report == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write config/.env from secrets
        run: |
          mkdir -p config
          cat > config/.env << EOF
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL=openrouter/deepseek/deepseek-chat-v3-0324
          EOF

      - name: Run daily report
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL: openrouter/deepseek/deepseek-chat-v3-0324
        run: |
          python pipeline/daily_report.py --preview --no-email

      - name: Track signals
        run: |
          python track_signals.py

      - name: Commit results back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signal_log.csv data/db/market.db report/ || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "data: daily signal tracking $(date +%Y-%m-%d)" && \
            git push

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.run_id }}
          path: report/
          if-no-files-found: warn
